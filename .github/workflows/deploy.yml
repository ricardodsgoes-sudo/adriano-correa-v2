name: Deploy para Hostinger

on:
  push:
    branches: [source]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build estático
        run: npm run build

      - name: Publicar no branch main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html
          publish_branch: main
          force_orphan: true

      - name: Notificar Hostinger
        run: curl -s -X POST https://webhooks.hostinger.com/deploy/9c52d161e841224b875910702b3f513d
